<!DOCTYPE html>
<html>
<head>

    <title>Edit Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2>Edit Event</h2>

<form method="POST">

<label>Event Name</label>

<input
class="form-control"
type="text"
name="event_name"
value="{{ event[1] }}">

<br>

<label>Description</label>

<textarea
class="form-control"
name="description">{{ event[2] }}</textarea>

<br>

<label>Date</label>

<input
class="form-control"
type="date"
name="event_date"
value="{{ event[3] }}">

<br>

<label>Time</label>

<input
class="form-control"
type="time"
name="event_time"
value="{{ event[4] }}">

<br>

<label>Venue</label>

<input
class="form-control"
type="text"
name="venue"
value="{{ event[5] }}">

<br>

<label>Total Seats</label>

<input
class="form-control"
type="number"
name="total_seats"
value="{{ event[6] }}">

<br>

<button
class="btn btn-success">
Update Event
</button>

</form>

</div>

</body>
</html>
