<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
{% include 'navbar.html' %}

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">
            EMS Portal
        </a>

        <div>

            <span class="text-white me-3">
                Welcome, {{ name }}
            </span>

            <a href="/logout"
            class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center">
        Dashboard
    </h1>

    <hr>
    <div class="row mb-4">

        <div class="col-md-4">

            <div class="card stats-card shadow">

                <div class="card-body text-center">

                    <h1>📅</h1>

                    <h2>{{ total_events }}</h2>

                    <p>Total Events</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card stats-card shadow">

                <div class="card-body text-center">

                    <h1>🎟</h1>

                    <h2>{{ my_events }}</h2>

                    <p>My Registrations</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card stats-card shadow">

                <div class="card-body text-center">

                    <h1>👤</h1>

                    <h2>{{ name }}</h2>

                    <p>Logged In User</p>

             </div>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow p-4 text-center">

                <h3>📅 Events</h3>

                <a
                href="/events"
                class="btn btn-primary mt-3">
                    View Events
                </a>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4 text-center">

                <h3>🎟 My Events</h3>

                <a
                href="/my_events"
                class="btn btn-success mt-3">
                    Open
                </a>

            </div>

        </div>

        {% if role == 'admin' %}

        <div class="col-md-4">

            <div class="card shadow p-4 text-center">

                <h3>⚙ Admin Panel</h3>

                <a
                href="/create_event"
                class="btn btn-warning mt-3">
                    Create Event
                </a>

            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
