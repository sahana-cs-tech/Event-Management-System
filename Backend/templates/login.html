<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Your CSS -->
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">
            Event Management System
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>Email</label>

                <input
                type="email"
                name="email"
                class="form-control"
                required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input
                type="password"
                name="password"
                class="form-control"
                required>

            </div>

            <button
            class="btn btn-primary w-100"
            type="submit">

                Login

            </button>

        </form>

        <hr>

        <a href="/register">
            Create New Account
        </a>

    </div>

</div>

</body>
</html>
