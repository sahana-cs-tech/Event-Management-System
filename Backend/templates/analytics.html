<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/style.css') }}">
</head>
<body>

<h1>Admin Analytics Dashboard</h1>

<div class="report-box">

    <div class="report-item">
        Total Users:
        {{ total_users }}
    </div>

    <div class="report-item">
        Total Events:
        {{ total_events }}
    </div>

    <div class="report-item">
        Total Registrations:
        {{ total_registrations }}
    </div>

    <div class="report-item">
        Most Popular Event:
        {{ popular_event[0] }}
    </div>

    <div class="report-item">
        Average Rating:
        {{ avg_rating }}
    </div>

</div>

<br>

<a href="/dashboard">
Back to Dashboard
</a>

</body>
</html>
