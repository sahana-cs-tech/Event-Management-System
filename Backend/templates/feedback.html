<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/style.css') }}">
</head>
<body>

<h1>Submit Feedback</h1>

<form method="POST">

    <label>Rating (1-5)</label>

    <input
    type="number"
    name="rating"
    min="1"
    max="5"
    required>

    <br><br>

    <label>Comments</label>

    <textarea
    name="comments"
    required>
    </textarea>

    <br><br>

    <button type="submit">
        Submit Feedback
    </button>

</form>

</body>
</html>
