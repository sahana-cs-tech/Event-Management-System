<!DOCTYPE html>
<html>
<head>

    <title>Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static',
    filename='css/style.css') }}">

</head>
<body>
{% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card shadow">

        <img
        src="{{ url_for(
        'static',
        filename='images/' + event[9]
        ) }}"
        class="card-img-top">

        <div class="card-body">

            <h2>{{ event[1] }}</h2>

            <p>
                {{ event[2] }}
            </p>

            <hr>

            <p>
                <strong>Date:</strong>
                {{ event[3] }}
            </p>

            <p>
                <strong>Time:</strong>
                {{ event[4] }}
            </p>

            <p>
                <strong>Venue:</strong>
                {{ event[5] }}
            </p>

            <p>
                <strong>Available Seats:</strong>
                {{ event[7] }}
            </p>

            <a
            href="/register_event/{{ event[0] }}"
            class="btn btn-success">
                Register
            </a>

            <a
            href="/feedback/{{ event[0] }}"
            class="btn btn-primary">
                Feedback
            </a>

        </div>

    </div>

</div>

</body>
</html>
