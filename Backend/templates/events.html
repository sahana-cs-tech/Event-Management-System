<!DOCTYPE html>
<html>
<head>
    <title>Available Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
{% include 'navbar.html' %}

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Available Events
    </h1>
    <form method="GET">

        <input
        type="text"
        name="search"
        placeholder="Search Events">

        <select name="category">

            <option value="">
                All Categories
            </option>

            {% for category in categories %}

            <option value="{{ category[0] }}">
                {{ category[1] }}
            </option>

            {% endfor %}

        </select>

        <button type="submit">
            Search
        </button>

    </form>

    <br>

    <div class="row">

        {% for event in events %}

        <div class="col-md-4 mb-4">

            <div class="card event-card shadow">

                <img
                src="{{ url_for(
                'static',
                filename='images/' + event[9]
                ) }}"
                class="card-img-top"
                alt="Event Image">

                <div class="card-body">

                    <h4 class="card-title">
                        {{ event[1] }}
                    </h4>

                    <p class="card-text">
                        {{ event[2] }}
                    </p>

                    <p>
                        📅 {{ event[3] }}
                    </p>

                    <p>
                        ⏰ {{ event[4] }}
                    </p>

                    <p>
                        📍 {{ event[5] }}
                    </p>

                    <p>
                        🎟 Seats Left:
                        {{ event[7] }}
                    </p>

                    <a
                    href="/event/{{ event[0] }}"
                    class="btn btn-primary">
                        View Details
                    </a>
                    {% if session.get('role') == 'admin' %}

                    <br>

                    <a href="/edit_event/{{ event[0] }}"
                    class="btn btn-warning">
                        Edit
                    </a>
                    <br><br>

                    <a href="/delete_event/{{ event[0] }}"
                    class="btn btn-danger"
                    onclick="return confirm('Are you sure you want to delete this event?');">
                        Delete
                    </a>

                    {% endif %}

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    <div class="text-center mt-4">

        <a href="/dashboard"
        class="btn btn-dark">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
